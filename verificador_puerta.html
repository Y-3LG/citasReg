<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verificador de Citas — Registro Civil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --surface2: #263248;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #F1F5F9;
    --text2: #94A3B8;
    --text3: #64748B;
    --navy: #1A3A6B;
    --blue: #3B82F6;
    --blue-glow: rgba(59,130,246,0.2);
    --green: #10B981;
    --green-bg: rgba(16,185,129,0.12);
    --green-border: rgba(16,185,129,0.3);
    --red: #EF4444;
    --red-bg: rgba(239,68,68,0.12);
    --red-border: rgba(239,68,68,0.3);
    --amber: #F59E0B;
    --amber-bg: rgba(245,158,11,0.12);
    --amber-border: rgba(245,158,11,0.3);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.25rem; position: sticky; top: 0; z-index: 50; }
  .hdr-inner { display: flex; align-items: center; height: 56px; gap: 12px; max-width: 480px; margin: 0 auto; }
  .hdr-logo { width: 34px; height: 34px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hdr-logo svg { width: 18px; height: 18px; fill: #fff; }
  .hdr-title { flex: 1; }
  .hdr-title h1 { font-size: 14px; font-weight: 600; }
  .hdr-title p { font-size: 11px; color: var(--text2); }
  .hdr-time { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--blue); background: var(--blue-glow); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(59,130,246,0.25); }
  .status-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  .main { max-width: 480px; margin: 0 auto; padding: 1.25rem; }

  /* Search box */
  .search-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .search-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); font-weight: 600; margin-bottom: 10px; display: block; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 14px; letter-spacing: 1px; text-transform: uppercase; transition: border-color 0.15s, box-shadow 0.15s; }
  .search-input::placeholder { color: var(--text3); text-transform: none; letter-spacing: 0; font-family: 'DM Sans'; }
  .search-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .search-btn { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .search-btn:hover { background: #2563EB; }
  .search-btn:active { transform: scale(0.97); }
  .divider { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 11px; color: var(--text3); }

  /* Quick access demos */
  .quick-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 600; margin-bottom: 8px; display: block; }
  .quick-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; color: var(--text2); transition: all 0.15s; letter-spacing: 0.5px; }
  .chip:hover { background: var(--blue-glow); border-color: var(--blue); color: var(--blue); }

  /* Result card */
  .result-card { border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; animation: slideUp 0.25s ease; border: 1px solid var(--border); }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }

  /* Status banner */
  .status-banner { padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; }
  .status-banner.ok { background: var(--green-bg); border-bottom: 1px solid var(--green-border); }
  .status-banner.warn { background: var(--amber-bg); border-bottom: 1px solid var(--amber-border); }
  .status-banner.err { background: var(--red-bg); border-bottom: 1px solid var(--red-border); }
  .status-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .status-icon.ok { background: var(--green-bg); border: 2px solid var(--green); }
  .status-icon.warn { background: var(--amber-bg); border: 2px solid var(--amber); }
  .status-icon.err { background: var(--red-bg); border: 2px solid var(--red); }
  .status-text h2 { font-size: 15px; font-weight: 700; }
  .status-text h2.ok { color: var(--green); }
  .status-text h2.warn { color: var(--amber); }
  .status-text h2.err { color: var(--red); }
  .status-text p { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Info sections */
  .card-body { background: var(--surface); }
  .info-section { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .info-section:last-child { border-bottom: none; }
  .info-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 700; margin-bottom: 10px; }
  .info-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; }
  .info-icon { font-size: 14px; flex-shrink: 0; width: 20px; margin-top: 1px; }
  .info-key { font-size: 12px; color: var(--text2); min-width: 90px; flex-shrink: 0; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 500; }
  .info-val.mono { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.ok { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge.warn { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge.err { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* Time indicator */
  .time-bar { background: var(--surface2); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; margin: 0 1.25rem 1rem; }
  .time-bar-label { font-size: 11px; color: var(--text2); }
  .time-bar-track { flex: 1; height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
  .time-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .time-bar-val { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; }

  /* Action buttons */
  .action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 1rem 1.25rem; background: var(--surface); border-top: 1px solid var(--border); }
  .act-btn { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.15s; text-align: center; }
  .act-btn:active { transform: scale(0.97); }
  .act-btn.admit { background: var(--green); color: #fff; }
  .act-btn.admit:hover { background: #059669; }
  .act-btn.deny { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .act-btn.deny:hover { background: rgba(239,68,68,0.2); }
  .act-btn.reschedule { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .act-btn.reschedule:hover { background: rgba(245,158,11,0.2); }
  .act-btn.clear { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .act-btn.clear:hover { background: var(--border2); }

  /* Queue section */
  .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-hdr h2 { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; }
  .queue-count { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700; }

  .queue-list { display: flex; flex-direction: column; gap: 6px; }
  .queue-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .queue-item:hover { border-color: var(--border2); background: var(--surface2); }
  .q-time { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--blue); min-width: 48px; }
  .q-info { flex: 1; }
  .q-name { font-size: 13px; font-weight: 600; }
  .q-svc { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .q-status { }
  .q-now { font-size: 10px; font-weight: 700; color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 4px; padding: 2px 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .q-next { font-size: 10px; color: var(--amber); }

  /* Toast */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 500; z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.green { color: var(--green); border-color: var(--green-border); }
  .toast.red { color: var(--red); border-color: var(--red-border); }
  .toast.amber { color: var(--amber); border-color: var(--amber-border); }

  /* Not found */
  .not-found { background: var(--surface); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 2rem; text-align: center; margin-bottom: 1rem; animation: slideUp 0.25s ease; }
  .not-found .nf-icon { font-size: 32px; margin-bottom: 8px; }
  .not-found h3 { font-size: 16px; font-weight: 600; color: var(--red); margin-bottom: 4px; }
  .not-found p { font-size: 13px; color: var(--text2); }

  /* Empty state */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 14px; }
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-logo">
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
    </div>
    <div class="hdr-title">
      <h1>Verificador de Citas</h1>
      <p>Registro Civil — Control de Acceso</p>
    </div>
    <div class="status-dot"></div>
    <div class="hdr-time" id="clockEl">--:--</div>
  </div>
</header>

<div class="main">

  <!-- Search -->
  <div class="search-section">
    <span class="search-label">Buscar por folio de cita</span>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Ingresa el folio..." maxlength="20" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')buscar()">
      <button class="search-btn" onclick="buscar()">Verificar</button>
    </div>
    <div class="divider"><div class="divider-line"></div><span>citas de hoy</span><div class="divider-line"></div></div>
    <span class="quick-label">Acceso rápido — demo</span>
    <div class="quick-chips">
      <div class="chip" onclick="cargar('RC-2025-482910')">RC-2025-482910</div>
      <div class="chip" onclick="cargar('RC-2025-371044')">RC-2025-371044</div>
      <div class="chip" onclick="cargar('RC-2025-600001')">RC-2025-600001</div>
      <div class="chip" onclick="cargar('RC-2025-000000')">Folio inválido</div>
    </div>
  </div>

  <!-- Result container -->
  <div id="resultContainer"></div>

  <!-- Queue -->
  <div class="section-hdr">
    <h2>Cola de hoy — <span id="fechaHoy"></span></h2>
    <div class="queue-count" id="qCount">6 pendientes</div>
  </div>
  <div class="queue-list" id="queueList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CITAS = {
  'RC-2025-482910': {
    nombre: 'María Fernanda García Martínez',
    curp: 'GAEM900101MDFRRR09',
    tramite: 'Acta de Nacimiento',
    fecha: 'martes, 6 de mayo de 2025',
    hora: '09:30',
    email: 'maria.garcia@gmail.com',
    tel: '5512345678',
    status: 'ok',   // ok | warn | used
    ventanilla: 'B',
    docs: ['Identificación oficial','CURP','Comprobante de domicilio']
  },
  'RC-2025-371044': {
    nombre: 'Roberto Sánchez Herrera',
    curp: 'SAHR850615HDFNRB03',
    tramite: 'Divorcio Administrativo',
    fecha: 'martes, 6 de mayo de 2025',
    hora: '11:00',
    email: 'rsanchez@outlook.com',
    tel: '5598765432',
    status: 'warn',  // warn = llegó tarde / fuera de horario
    ventanilla: 'B',
    docs: ['IDs de ambos cónyuges','Acta de matrimonio','Convenio firmado']
  },
  'RC-2025-600001': {
    nombre: 'Lucía Mendoza Torres',
    curp: 'METL920320MDFNRC01',
    tramite: 'CURP',
    fecha: 'lunes, 5 de mayo de 2025',
    hora: '10:00',
    email: 'lucia.mt@yahoo.com',
    tel: '5523456789',
    status: 'used',  // used = ya fue atendida
    ventanilla: 'A',
    docs: ['Acta de nacimiento','Identificación oficial']
  }
};

const QUEUE = [
  { folio:'RC-2025-482910', hora:'09:30', nombre:'María F. García', tramite:'Acta de Nacimiento', estado:'activo' },
  { folio:'RC-2025-510234', hora:'10:00', nombre:'José L. Ramírez', tramite:'Reconocimiento de Hijo', estado:'pendiente' },
  { folio:'RC-2025-371044', hora:'11:00', nombre:'Roberto Sánchez', tramite:'Divorcio Administrativo', estado:'pendiente' },
  { folio:'RC-2025-521009', hora:'11:30', nombre:'Ana P. Flores', tramite:'Acta de Nacimiento', estado:'pendiente' },
  { folio:'RC-2025-489001', hora:'12:00', nombre:'Carlos Reyes V.', tramite:'Acta de Matrimonio', estado:'pendiente' },
  { folio:'RC-2025-600001', hora:'10:00', nombre:'Lucía Mendoza', tramite:'CURP', estado:'atendido' },
];

let admitted = new Set();

function tick(){
  const now = new Date();
  document.getElementById('clockEl').textContent = now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick, 1000);

const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const hoy=new Date();
document.getElementById('fechaHoy').textContent=dias[hoy.getDay()]+' '+hoy.getDate()+'/'+String(hoy.getMonth()+1).padStart(2,'0');

function cargar(folio){
  document.getElementById('searchInput').value=folio;
  buscar();
}

function buscar(){
  const raw = document.getElementById('searchInput').value.trim().toUpperCase();
  const folio = raw.startsWith('RC-') ? raw : 'RC-'+raw;
  const cita = CITAS[folio]||CITAS[raw];
  const isAdmitted = admitted.has(folio)||admitted.has(raw);
  renderResult(folio, cita, isAdmitted);
}

function renderResult(folio, cita, isAdmitted){
  const c = document.getElementById('resultContainer');
  if(!cita){
    c.innerHTML=`<div class="not-found"><div class="nf-icon">🔍</div><h3>Folio no encontrado</h3><p>El folio <strong>${folio}</strong> no existe en el sistema.<br>Verifica el número e intenta de nuevo.</p></div>`;
    return;
  }
  let statusClass='', statusIcon='', statusTitle='', statusMsg='';
  if(isAdmitted||cita.status==='used'){
    statusClass='err'; statusIcon='⚠️';
    statusTitle='Cita ya atendida';
    statusMsg='Esta persona ya fue registrada y atendida hoy.';
  } else if(cita.status==='ok'){
    statusClass='ok'; statusIcon='✅';
    statusTitle='Cita válida — Permitir acceso';
    statusMsg='Documentación y horario verificados correctamente.';
  } else if(cita.status==='warn'){
    statusClass='warn'; statusIcon='⏰';
    statusTitle='Fuera de horario';
    statusMsg='La cita estaba programada para las '+cita.hora+' hrs. Evaluación requerida.';
  }

  // Tiempo restante o transcurrido
  const [hh,mm]=cita.hora.split(':').map(Number);
  const citaMin=hh*60+mm;
  const ahoraMin=new Date().getHours()*60+new Date().getMinutes();
  const diff=citaMin-ahoraMin;
  let timeLabel='', timePct=50, timeColor='var(--blue)';
  if(diff>30){timeLabel=`En ${diff} min`;timePct=20;timeColor='var(--green)';}
  else if(diff>0&&diff<=30){timeLabel=`En ${diff} min`;timePct=60;timeColor='var(--amber)';}
  else if(diff===0){timeLabel='¡Ahora!';timePct=100;timeColor='var(--green)';}
  else{timeLabel=`Hace ${Math.abs(diff)} min`;timePct=100;timeColor=Math.abs(diff)>30?'var(--red)':'var(--amber)';}

  const folioKey = folio;
  c.innerHTML=`
  <div class="result-card">
    <div class="status-banner ${statusClass}">
      <div class="status-icon ${statusClass}">${statusIcon}</div>
      <div class="status-text">
        <h2 class="${statusClass}">${statusTitle}</h2>
        <p>${statusMsg}</p>
      </div>
    </div>
    <div class="card-body">
      <div class="info-section">
        <div class="info-section-title">Ciudadano</div>
        <div class="info-row"><span class="info-icon">👤</span><span class="info-key">Nombre</span><span class="info-val">${cita.nombre}</span></div>
        <div class="info-row"><span class="info-icon">🪪</span><span class="info-key">CURP</span><span class="info-val mono">${cita.curp}</span></div>
        <div class="info-row"><span class="info-icon">📧</span><span class="info-key">Correo</span><span class="info-val" style="font-size:12px">${cita.email}</span></div>
        <div class="info-row"><span class="info-icon">📱</span><span class="info-key">Teléfono</span><span class="info-val">${cita.tel}</span></div>
      </div>
      <div class="info-section">
        <div class="info-section-title">Detalles de la cita</div>
        <div class="info-row"><span class="info-icon">📋</span><span class="info-key">Trámite</span><span class="info-val">${cita.tramite}</span></div>
        <div class="info-row"><span class="info-icon">📅</span><span class="info-key">Fecha</span><span class="info-val">${cita.fecha}</span></div>
        <div class="info-row"><span class="info-icon">⏰</span><span class="info-key">Hora</span><span class="info-val"><strong>${cita.hora} hrs</strong></span></div>
        <div class="info-row"><span class="info-icon">🚪</span><span class="info-key">Ventanilla</span><span class="info-val">Ventanilla ${cita.ventanilla}</span></div>
        <div class="info-row"><span class="info-icon">🎫</span><span class="info-key">Folio</span><span class="info-val mono" style="color:var(--blue)">${folioKey}</span></div>
      </div>
      <div class="info-section">
        <div class="info-section-title">Estado</div>
        <div class="info-row"><span class="info-icon">📊</span><span class="info-key">Estatus</span><span class="info-val"><span class="badge ${statusClass}">${statusClass==='ok'?'Válida':statusClass==='warn'?'Revisión':statusClass==='err'?'Ya atendida':''}</span></span></div>
        <div class="info-row"><span class="info-icon">📎</span><span class="info-key">Documentos</span><span class="info-val" style="font-size:11px;line-height:1.6">${cita.docs.join('<br>')}</span></div>
      </div>
    </div>
    <div class="time-bar">
      <span class="time-bar-label">⏱ Cita:</span>
      <div class="time-bar-track"><div class="time-bar-fill" style="width:${timePct}%;background:${timeColor}"></div></div>
      <span class="time-bar-val" style="color:${timeColor}">${timeLabel}</span>
    </div>
    <div class="action-bar">
      ${(cita.status==='ok'&&!isAdmitted)?`<button class="act-btn admit" onclick="admitir('${folioKey}')">✅ Admitir</button>`:
        (isAdmitted||cita.status==='used')?`<button class="act-btn deny" onclick="showToast('Cita ya procesada','red')">⛔ Ya atendida</button>`
        :`<button class="act-btn reschedule" onclick="showToast('Solicitud de reubicación enviada al sistema','amber')">🔄 Reubicar</button>`}
      ${cita.status==='warn'?`<button class="act-btn admit" onclick="admitir('${folioKey}')">⚠️ Admitir igual</button>`:`<button class="act-btn deny" onclick="denegar('${folioKey}')">❌ Denegar</button>`}
      <button class="act-btn reschedule" style="grid-column:1/-1" onclick="showToast('Notificación enviada al oficial de ventanilla '+\`${cita.ventanilla}\`,'green')">📢 Notificar al oficial</button>
    </div>
  </div>`;
}

function admitir(folio){
  admitted.add(folio);
  showToast('✅ Acceso permitido — '+folio,'green');
  setTimeout(()=>{ document.getElementById('resultContainer').innerHTML=''; document.getElementById('searchInput').value=''; renderQueue(); },1800);
}
function denegar(folio){
  showToast('⛔ Acceso denegado — '+folio,'red');
  setTimeout(()=>{ document.getElementById('resultContainer').innerHTML=''; document.getElementById('searchInput').value=''; },1500);
}

function showToast(msg,type='green'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3000);
}

function renderQueue(){
  const list=document.getElementById('queueList');
  const pending=QUEUE.filter(q=>q.estado!=='atendido'&&!admitted.has(q.folio));
  document.getElementById('qCount').textContent=pending.length+' pendientes';
  list.innerHTML=QUEUE.map((q,i)=>{
    const isAdm=admitted.has(q.folio);
    const isUsed=q.estado==='atendido';
    return `<div class="queue-item" onclick="cargar('${q.folio}')">
      <span class="q-time">${q.hora}</span>
      <div class="q-info">
        <div class="q-name" style="${isAdm||isUsed?'color:var(--text3);text-decoration:line-through':q.estado==='activo'?'color:var(--green)':''}">${q.nombre}</div>
        <div class="q-svc">${q.tramite}</div>
      </div>
      <div class="q-status">
        ${isAdm||isUsed?'<span style="font-size:11px;color:var(--text3)">✓ Atendido</span>':
          q.estado==='activo'?'<span class="q-now">Ahora</span>':
          i===1?'<span class="q-next">Siguiente</span>':''}
      </div>
    </div>`;
  }).join('');
}
renderQueue();
setInterval(renderQueue,5000);
</script>
</body>
</html>
